version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cash_recon_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cashrecon
      POSTGRES_PASSWORD: cashrecon_secret
      POSTGRES_DB: cash_reconciliation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
